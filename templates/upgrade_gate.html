<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} - PermitGrab</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --accent: #f97316;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
}
.card {
  background: white;
  max-width: 500px;
  width: 100%;
  padding: 48px;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0,0,0,.1);
  text-align: center;
}
.card h1 {
  font-size: 24px;
  margin-bottom: 16px;
  color: var(--gray-900);
}
.card p {
  color: var(--gray-500);
  margin-bottom: 24px;
  font-size: 16px;
}
.card .btn {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 14px 36px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  transition: background .2s;
}
.card .btn:hover {
  background: var(--primary-dark);
}
.card .back-link {
  display: block;
  margin-top: 20px;
  color: var(--gray-400);
  font-size: 14px;
  text-decoration: none;
}
.card .back-link:hover {
  color: var(--gray-600);
}
.feature-icon {
  width: 64px;
  height: 64px;
  background: var(--gray-100);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px;
}

/* Footer styles */
.site-footer {
  background: var(--gray-900);
  color: white;
  padding: 48px 32px 24px;
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
}
.footer-brand p { color: var(--gray-400); font-size: 14px; margin-top: 12px; }
.footer-logo { font-size: 22px; font-weight: 700; color: white; text-decoration: none; }
.footer-logo span { color: var(--accent); }
.footer-links h4 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: white; }
.footer-links a { display: block; color: var(--gray-400); font-size: 14px; text-decoration: none; margin-bottom: 10px; }
.footer-links a:hover { color: white; }
.footer-bottom { max-width: 1200px; margin: 32px auto 0; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.1); font-size: 13px; color: var(--gray-400); text-align: center; }
@media (max-width: 768px) {
  .footer-inner { grid-template-columns: 1fr 1fr; gap: 32px; }
}
</style>
</head>
<body>
{% include 'partials/nav.html' %}

<div class="main-content">
  <div class="card">
    <div class="feature-icon">{{ icon }}</div>
    <h1>{{ heading }}</h1>
    <p>{{ description }}</p>
    <a href="/pricing" class="btn">Upgrade to Pro</a>
    <a href="/" class="back-link">Back to Home</a>
  </div>
</div>

{% include 'partials/footer.html' %}
</body>
</html>
