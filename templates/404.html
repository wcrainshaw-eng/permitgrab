<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - PermitGrab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb;
  --accent: #f97316;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-700); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
.nav { background: var(--gray-900); padding: 16px 32px; }
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 22px; font-weight: 700; color: white; text-decoration: none; }
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 24px; align-items: center; }
.nav-links a { color: rgba(255,255,255,.7); text-decoration: none; font-size: 14px; }
.nav-links a:hover { color: white; }
.nav-btn { background: var(--accent); color: white !important; padding: 8px 16px; border-radius: 6px; font-weight: 600; }
.nav-btn:hover { background: #ea580c; }

/* 404 HERO */
.error-hero {
  flex: 1;
  background: linear-gradient(135deg, var(--gray-900) 0%, #374151 100%);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
}
.error-content { max-width: 500px; }
.error-code {
  font-size: 120px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.error-title {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
}
.error-message {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  margin-bottom: 32px;
}
.error-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all .2s;
  border: none;
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
.btn-outline {
  background: transparent;
  border: 2px solid rgba(255,255,255,.3);
  color: white;
}
.btn-outline:hover { border-color: white; background: rgba(255,255,255,.1); }

.error-help {
  margin-top: 40px;
  font-size: 14px;
  color: rgba(255,255,255,.5);
}
.error-help a {
  color: rgba(255,255,255,.7);
  text-decoration: none;
}
.error-help a:hover { text-decoration: underline; }

.footer { background: var(--gray-900); color: rgba(255,255,255,.6); padding: 24px 32px; text-align: center; font-size: 14px; border-top: 1px solid rgba(255,255,255,.1); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">Permit<span>Grab</span></a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/pricing">Pricing</a>
      <a href="/get-alerts">Get Alerts</a>
      <a href="/login">Log In</a>
      <a href="/signup" class="nav-btn">Sign Up</a>
    </div>
  </div>
</nav>

<section class="error-hero">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-buttons">
      <a href="/" class="btn btn-primary">Back to Dashboard</a>
      <a href="/pricing" class="btn btn-outline">Browse Cities</a>
    </div>
    <p class="error-help">Looking for something? Try <a href="/">searching for permits</a> on the dashboard.</p>
  </div>
</section>

<footer class="footer">
  <p>&copy; 2026 PermitGrab. Construction permit leads, updated daily.</p>
</footer>

</body>
</html>
