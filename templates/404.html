<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - PermitGrab</title>
<meta name="description" content="The page you're looking for doesn't exist. Return to PermitGrab to browse building permit leads.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb;
  --accent: #f97316;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-700); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
.nav { background: var(--gray-900); padding: 16px 32px; }
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 22px; font-weight: 700; color: white; text-decoration: none; }
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 24px; align-items: center; }
.nav-links a { color: rgba(255,255,255,.7); text-decoration: none; font-size: 14px; }
.nav-links a:hover { color: white; }
.nav-btn { background: var(--accent); color: white !important; padding: 8px 16px; border-radius: 6px; font-weight: 600; }
.nav-btn:hover { background: #ea580c; }

/* 404 HERO */
.error-hero {
  flex: 1;
  background: linear-gradient(135deg, var(--gray-900) 0%, #374151 100%);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 32px;
}
.error-content { max-width: 500px; }
.error-code {
  font-size: 120px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.error-title {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
}
.error-message {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  margin-bottom: 32px;
}
.error-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: all .2s;
  border: none;
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
.btn-outline {
  background: transparent;
  border: 2px solid rgba(255,255,255,.3);
  color: white;
}
.btn-outline:hover { border-color: white; background: rgba(255,255,255,.1); }

.error-help {
  margin-top: 40px;
  font-size: 14px;
  color: rgba(255,255,255,.5);
}
.error-help a {
  color: rgba(255,255,255,.7);
  text-decoration: none;
}
.error-help a:hover { text-decoration: underline; }

/* SITE FOOTER */
.site-footer {
  background: var(--gray-900);
  color: white;
  padding: 48px 32px 24px;
  border-top: 1px solid rgba(255,255,255,.1);
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  gap: 48px;
  flex-wrap: wrap;
}
.footer-brand { max-width: 300px; }
.footer-logo {
  font-size: 24px;
  font-weight: 700;
  color: white;
  text-decoration: none;
  display: block;
  margin-bottom: 12px;
}
.footer-logo span { color: var(--accent); }
.footer-brand p {
  font-size: 14px;
  color: rgba(255,255,255,.5);
  line-height: 1.6;
}
.footer-links h4 {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  color: rgba(255,255,255,.7);
}
.footer-links a {
  display: block;
  color: rgba(255,255,255,.5);
  text-decoration: none;
  font-size: 14px;
  margin-bottom: 10px;
  transition: color .2s;
}
.footer-links a:hover { color: white; }
.footer-bottom {
  max-width: 1200px;
  margin: 32px auto 0;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,.1);
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,.4);
}
@media (max-width: 768px) {
  .footer-inner { flex-direction: column; gap: 32px; }
}
</style>
</head>
<body>

{% include 'partials/nav.html' %}

<section class="error-hero">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-buttons">
      <a href="/" class="btn btn-primary">Back to Dashboard</a>
      <a href="/pricing" class="btn btn-outline">Browse Cities</a>
    </div>
    <p class="error-help">Looking for something? Try <a href="/">searching for permits</a> on the dashboard.</p>
  </div>
</section>

{% include 'partials/footer.html' %}

</body>
</html>
