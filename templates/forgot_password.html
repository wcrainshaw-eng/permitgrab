<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - PermitGrab</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --accent: #f97316;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --green: #16a34a;
  --red: #dc2626;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
}
.auth-card {
  background: white;
  max-width: 420px;
  width: 100%;
  padding: 48px;
  border-radius: 16px;
  box-shadow: 0 4px 6px rgba(0,0,0,.05), 0 10px 20px rgba(0,0,0,.1);
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo a {
  font-size: 28px;
  font-weight: 800;
  color: var(--gray-900);
  text-decoration: none;
}
.logo a span { color: var(--accent); }
.auth-card h1 {
  font-size: 24px;
  text-align: center;
  margin-bottom: 8px;
  color: var(--gray-900);
}
.auth-card .subtitle {
  text-align: center;
  color: var(--gray-500);
  margin-bottom: 32px;
  font-size: 15px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-700);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  font-size: 16px;
  transition: border-color .2s;
}
.form-group input:focus {
  outline: none;
  border-color: var(--primary);
}
.btn {
  width: 100%;
  padding: 14px 24px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled {
  background: var(--gray-400);
  cursor: not-allowed;
}
.message {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
}
.message.success {
  background: #dcfce7;
  color: var(--green);
  border: 1px solid #86efac;
}
.message.error {
  background: #fef2f2;
  color: var(--red);
  border: 1px solid #fecaca;
}
.auth-footer {
  text-align: center;
  margin-top: 24px;
  color: var(--gray-500);
  font-size: 14px;
}
.auth-footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover { text-decoration: underline; }

/* Footer styles */
.site-footer {
  background: var(--gray-900);
  color: white;
  padding: 48px 32px 24px;
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
}
.footer-brand p { color: var(--gray-400); font-size: 14px; margin-top: 12px; }
.footer-logo { font-size: 22px; font-weight: 700; color: white; text-decoration: none; }
.footer-logo span { color: var(--accent); }
.footer-links h4 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: white; }
.footer-links a { display: block; color: var(--gray-400); font-size: 14px; text-decoration: none; margin-bottom: 10px; }
.footer-links a:hover { color: white; }
.footer-bottom { max-width: 1200px; margin: 32px auto 0; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.1); font-size: 13px; color: var(--gray-400); text-align: center; }
@media (max-width: 768px) {
  .footer-inner { grid-template-columns: 1fr 1fr; gap: 32px; }
  .auth-card { padding: 32px 24px; }
}
</style>
</head>
<body>
{% include 'partials/nav.html' %}

<div class="main-content">
  <div class="auth-card">
    <div class="logo">
      <a href="/">Permit<span>Grab</span></a>
    </div>
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link</p>

    <div id="message" class="message" style="display: none;"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Send Reset Link</button>
    </form>

    <div class="auth-footer">
      Remember your password? <a href="/login">Log in</a>
    </div>
  </div>
</div>

{% include 'partials/footer.html' %}

<script>
document.getElementById('forgot-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('message');

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const resp = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await resp.json();

    msg.style.display = 'block';
    if (data.success) {
      msg.className = 'message success';
      msg.textContent = 'If an account exists with that email, you will receive a password reset link shortly.';
      document.getElementById('forgot-form').style.display = 'none';
    } else {
      msg.className = 'message error';
      msg.textContent = data.error || 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  } catch (err) {
    msg.style.display = 'block';
    msg.className = 'message error';
    msg.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
});
</script>

</body>
</html>
