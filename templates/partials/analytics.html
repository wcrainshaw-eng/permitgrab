<!-- V14.0 SEO: Preconnect hints for faster resource loading -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://www.google-analytics.com">
<link rel="dns-prefetch" href="https://www.googletagmanager.com">
<link rel="dns-prefetch" href="https://www.google-analytics.com">

<!-- Google Analytics GA4 -->
<!-- V12.24: Reads GA4 ID from GOOGLE_ANALYTICS_ID env var -->
{% if config.GOOGLE_ANALYTICS_ID %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ config.GOOGLE_ANALYTICS_ID }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ config.GOOGLE_ANALYTICS_ID }}');

  // Custom event tracking for key conversions
  function trackEvent(eventName, eventParams) {
    gtag('event', eventName, eventParams || {});
  }

  // Track pricing page views
  if (window.location.pathname === '/pricing') {
    trackEvent('view_pricing');
  }

  // Track signup/login page views
  if (window.location.pathname === '/signup') {
    trackEvent('view_signup');
  }
  if (window.location.pathname === '/login') {
    trackEvent('view_login');
  }
</script>
{% else %}
<!-- GA4 not configured - set GOOGLE_ANALYTICS_ID env var to enable -->
{% endif %}

<!-- V30: Google Ads Remarketing Tag -->
<!-- Set GOOGLE_ADS_ID env var (e.g., AW-XXXXXXXXX) to enable remarketing -->
{% if config.GOOGLE_ADS_ID %}
<script>
  gtag('config', '{{ config.GOOGLE_ADS_ID }}');
</script>
{% endif %}

<!-- V30: Facebook/Meta Pixel -->
<!-- Set META_PIXEL_ID env var to enable -->
{% if config.META_PIXEL_ID %}
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '{{ config.META_PIXEL_ID }}');
  fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id={{ config.META_PIXEL_ID }}&ev=PageView&noscript=1"/></noscript>
{% endif %}

<!-- Google Search Console Verification -->
{% if config.GOOGLE_SITE_VERIFICATION %}
<meta name="google-site-verification" content="{{ config.GOOGLE_SITE_VERIFICATION }}">
{% endif %}
