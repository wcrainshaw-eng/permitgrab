<!-- V14.0 SEO: Preconnect hints for faster resource loading -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://www.google-analytics.com">
<link rel="dns-prefetch" href="https://www.googletagmanager.com">
<link rel="dns-prefetch" href="https://www.google-analytics.com">

<!-- Google Analytics GA4 -->
<!-- V12.24: Reads GA4 ID from GOOGLE_ANALYTICS_ID env var -->
{% if config.GOOGLE_ANALYTICS_ID %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ config.GOOGLE_ANALYTICS_ID }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ config.GOOGLE_ANALYTICS_ID }}');

  // Custom event tracking for key conversions
  function trackEvent(eventName, eventParams) {
    gtag('event', eventName, eventParams || {});
  }

  // Track pricing page views
  if (window.location.pathname === '/pricing') {
    trackEvent('view_pricing');
  }

  // Track signup/login page views
  if (window.location.pathname === '/signup') {
    trackEvent('view_signup');
  }
  if (window.location.pathname === '/login') {
    trackEvent('view_login');
  }
</script>
{% else %}
<!-- GA4 not configured - set GOOGLE_ANALYTICS_ID env var to enable -->
{% endif %}

<!-- Google Search Console Verification -->
{% if config.GOOGLE_SITE_VERIFICATION %}
<meta name="google-site-verification" content="{{ config.GOOGLE_SITE_VERIFICATION }}">
{% endif %}
