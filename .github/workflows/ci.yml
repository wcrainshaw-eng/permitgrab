name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint (syntax errors only)
        run: ruff check . --select=E9,F63,F7,F82
      - name: Smoke tests
        run: pytest tests/test_smoke.py tests/test_imports.py -q
      - name: Route tests
        run: pytest tests/test_routes.py -q
