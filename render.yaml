# Deploy to Render.com
# 1. Push this repo to GitHub
# 2. Connect to Render.com
# 3. It auto-deploys from this config
#
# V62: Migrated from SQLite to PostgreSQL to eliminate "database is locked"
# errors caused by 5 daemon threads competing for write locks.
# The persistent disk is kept for backwards compatibility during migration.
#
# V414/V415 (CODE_V365b): split daemon into a separate Background Worker
# service so the web process gets the full 512MB Render limit instead of
# sharing it with collector + enrichment + email scheduler threads. The
# web process was OOM-killing at ~768MB / 150% of the limit, causing
# intermittent 502s. Worker uses its own 512MB; communication is via the
# shared PostgreSQL DB.

databases:
  - name: permitgrab-db
    plan: starter  # 1GB, shared CPU — upgrade to standard for production
    databaseName: permitgrab
    user: permitgrab

services:
  - type: web
    name: permitgrab
    runtime: python
    buildCommand: find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null; pip install -r requirements.txt
    # V416: 1 worker x 4 threads — server.py is 18K lines, 2 workers
    # exceeded the 512MB Render limit even with WORKER_MODE=true (521MB
    # baseline → OOM-kill loop → 502s). 1 worker + 4 threads keeps the
    # same 4 concurrent handlers in a single process. --preload still
    # saves memory (master forks one worker via COW). --max-requests 500
    # recycles the worker to prevent leaks.
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --graceful-timeout 30 --max-requests 500 --max-requests-jitter 50 --preload
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # V414 (CODE_V365b PHASE B): tells server.py's start_collectors()
      # to no-op and let worker.py own the daemon threads.
      - key: WORKER_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: permitgrab-db
          property: connectionString
      # Persistent SECRET_KEY so sessions survive deploys. Set manually in
      # the Render dashboard once (sync: false leaves the value alone).
      - key: SECRET_KEY
        sync: false
    # Keep disk during migration — remove after verifying Postgres data
    disk:
      name: permitgrab-data
      mountPath: /var/data
      sizeGB: 1

  # V415 (CODE_V365b PHASE B Part 3): standalone background worker service.
  # Runs the collector + enrichment + email scheduler outside the web
  # process so the web server gets the full 512MB. Communicates with the
  # web service only through the shared PostgreSQL DB. ~$7/mo Starter plan.
  - type: worker
    name: permitgrab-worker
    runtime: python
    buildCommand: find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null; pip install -r requirements.txt
    startCommand: python3 worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: permitgrab-db
          property: connectionString
      # Mirror the web disk so /var/data resolution works the same in
      # the worker (used by DATA_DIR fallback in db.py + worker.py for
      # subscribers.json + lock files).
    disk:
      name: permitgrab-worker-data
      mountPath: /var/data
      sizeGB: 1
