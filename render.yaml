# Deploy to Render.com
# 1. Push this repo to GitHub
# 2. Connect to Render.com
# 3. It auto-deploys from this config
#
# V62: Migrated from SQLite to PostgreSQL to eliminate "database is locked"
# errors caused by 5 daemon threads competing for write locks.
# The persistent disk is kept for backwards compatibility during migration.
#
# V414/V415 (CODE_V365b): split daemon into a separate Background Worker
# service so the web process gets dedicated memory instead of sharing it
# with collector + enrichment + email scheduler threads.
# V418 (2026-04-26): web service is on Render Standard plan (2GB RAM) —
# the historical "512MB" comments below are stale. The Dockerfile CMD
# is what actually runs (this startCommand is ignored when a Dockerfile
# is present); see Dockerfile for the live gunicorn config.

databases:
  - name: permitgrab-db
    plan: starter  # 1GB, shared CPU — upgrade to standard for production
    databaseName: permitgrab
    user: permitgrab

services:
  - type: web
    name: permitgrab
    runtime: python
    buildCommand: find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null; pip install -r requirements.txt
    # V416: 1 worker x 4 threads. (Original rationale: 2 workers exceeded
    # the legacy 512MB plan even with WORKER_MODE=true.) V418 (2026-04-26):
    # web service has been on Standard plan (2GB RAM) — 1 worker is now
    # kept for daemon-thread locality (the _collector_started flag is
    # process-local; two workers would race the daemon spawn). --preload
    # still saves memory (master forks one worker via COW). --max-requests
    # 500 recycles the worker to prevent leaks. NOTE: this startCommand is
    # IGNORED when a Dockerfile is present — see Dockerfile for live config.
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --graceful-timeout 30 --max-requests 500 --max-requests-jitter 50 --preload
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # V481 (worker/web split): the web service MUST NOT have
      # WORKER_MODE=1 — only the permitgrab-worker service does. The
      # gate in server.py's start_collectors() refuses to spawn daemons
      # unless WORKER_MODE == '1'. Older configs used WORKER_MODE=true
      # to mean "no daemons here"; V481 inverts the convention so the
      # check is `== '1'` (positive identification of the worker).
      - key: DATABASE_URL
        fromDatabase:
          name: permitgrab-db
          property: connectionString
      # Persistent SECRET_KEY so sessions survive deploys. Set manually in
      # the Render dashboard once (sync: false leaves the value alone).
      - key: SECRET_KEY
        sync: false
    # Keep disk during migration — remove after verifying Postgres data
    disk:
      name: permitgrab-data
      mountPath: /var/data
      sizeGB: 1

  # V415 (CODE_V365b PHASE B Part 3): standalone background worker service.
  # Runs the collector + enrichment + email scheduler outside the web process
  # so the web server has dedicated memory. Communicates with the web service
  # only through the shared PostgreSQL DB.
  # V481 (2026-05-01): now LIVE. Created in Render dashboard with
  # WORKER_MODE=1 set as the daemon-spawn gate. Web service intentionally
  # has no WORKER_MODE so server.py's start_collectors() returns early
  # there. This split eliminates the GIL-contention wedges that took the
  # site down through V287/V455/V470/V478/V480.
  - type: worker
    name: permitgrab-worker
    runtime: python
    buildCommand: find . -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null; pip install -r requirements.txt
    startCommand: python3 worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # V481: the daemon-spawn gate. server.py:start_collectors() and
      # /api/admin/start-collectors both refuse to run unless this == '1'.
      - key: WORKER_MODE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: permitgrab-db
          property: connectionString
      # Mirror the web disk so /var/data resolution works the same in
      # the worker (used by DATA_DIR fallback in db.py + worker.py for
      # subscribers.json + lock files).
    disk:
      name: permitgrab-worker-data
      mountPath: /var/data
      sizeGB: 1
