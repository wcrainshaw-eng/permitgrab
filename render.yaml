# Deploy to Render.com
# 1. Push this repo to GitHub
# 2. Connect to Render.com
# 3. It auto-deploys from this config

services:
  - type: web
    name: permitgrab
    runtime: docker
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    # Persistent disk for user data (survives deploys)
    disk:
      name: permitgrab-data
      mountPath: /var/data
      sizeGB: 1
